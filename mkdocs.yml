site_name: ZY's Garden 🌱
site_description: 应灼灿的个人知识库 / 数字花园
site_author: ihoooohi
site_url: https://ihoooohi.github.io/garden/
repo_url: https://github.com/ihoooohi/garden
repo_name: ihoooohi/garden
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: 切换到夜间模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: 切换到日间模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ihoooohi
  generator: false

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

copyright: Copyright &copy; 2026 ihoooohi · 用 ❤️ 和 MkDocs Material 搭成

nav:
  - 首页: index.md
  - 📚 读文沉淀:
      - reading/index.md
      - reading/mem0-research-notes.md
      - reading/juicebox-agent-orchestration.md
      - reading/agent-reliability-bottleneck.md
  - 🛠️ 技术笔记:
      - tech/index.md
      - tech/hermes-architecture.md
      - tech/hermes-session-search.md
      - tech/hermes-team-deployment.md
      - tech/hermes-multi-profile.md
      - tech/hermes-memory-stack.md
      - tech/fact-store-benchmark-report.md
      - tech/holographic-memory-final-verdict.md
      - tech/web-scraping-toolchain.md
  - 💼 面试题集:
      - interview/index.md
      - interview/ai-agent-interview-tour.md
      - interview/agent-service-reliability.md
      - interview/vector-db-milvus.md
  - 💭 思考与随笔:
      - thoughts/index.md
      - thoughts/algorithm-vs-llm-reasoning.md
      - thoughts/data-driven-correction.md
      - thoughts/synthetic-vs-real-benchmark.md
  - 🏷️ 标签: tags.md
